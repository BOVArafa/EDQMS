    - Roadmap: project/roadmap.md
  - Discovery:
    - Intro: discovery/intro.md
    - Assumptions: discovery/assumptions.md
    - Workshop: discovery/workshop.md
    - Problem Statement: discovery/problem-statement.md
  - Prototyping:
    - Intro: prototype/intro.md
    - Grounding: prototype/grounding.md
    - Data Model: prototype/data-model.md
    - Prototype: prototype/prototype.md
  - Validation:
    - Intro: audit/intro.md
    - End-to-End Case: audit/end-to-end-case.md
    - MVP Assessment: audit/mvp-assessment.md
  - Develop and Deploy:
    - Intro: implementation/intro.md
  - Q&A:
    - Q&A: questions/index.md
