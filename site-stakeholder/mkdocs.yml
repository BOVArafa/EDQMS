site_name: EDQMS
site_description: Event Driven Quality Management System — ISO 9001:2015 aligned
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

extra_css:
