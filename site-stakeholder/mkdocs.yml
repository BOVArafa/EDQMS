site_name: EDQMS
site_description: Event Driven Quality Management System — ISO 9001:2015 aligned
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - navigation.top
    - navigation.expand
    - navigation.instant
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - toc.follow
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables

extra_css:
  - stylesheets/chatbot.css

extra_javascript:
  - javascripts/chatbot.js

nav:
  - Home:
    - Welcome: index.md
    - How to use this site: how-to-use-this-site.md
    - Project Status: project-status.md
  - The Project:
    - Intro: project/intro.md
    - First Phase: project/first-phase.md
    - Second Phase: project/second-phase.md
    - Third Phase: project/third-phase.md
    - Roadmap: project/roadmap.md
  - Discovery:
    - Intro: discovery/intro.md
    - Assumptions: discovery/assumptions.md
    - Workshop: discovery/workshop.md
    - Problem Statement: discovery/problem-statement.md
  - Prototyping:
    - Intro: prototype/intro.md
    - Grounding: prototype/grounding.md
    - Data Model: prototype/data-model.md
    - Prototype: prototype/prototype.md
  - Validation:
    - Intro: audit/intro.md
    - End-to-End Case: audit/end-to-end-case.md
    - MVP Assessment: audit/mvp-assessment.md
  - Develop and Deploy:
    - Intro: implementation/intro.md
  - Q&A:
    - Q&A: questions/index.md
