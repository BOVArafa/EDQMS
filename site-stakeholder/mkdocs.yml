site_name: Engineering Hub Governance
site_url: https://bovarafa.github.io/EDQMS/
site_description: Event Driven Quality Management System — ISO 9001:2015 aligned
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    annotation: material/clock

  features:
    - content.footnote.tooltips
    - navigation.footer
    - navigation.top
    - navigation.expand
    - navigation.instant
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - toc.follow
    - search.suggest

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
  - tables

extra_css:
  - stylesheets/chatbot.css

extra_javascript:
  - javascripts/chatbot.js

nav:
  - Home:
    - Welcome: index.md
    - How to use this site: how-to-use-this-site.md
    - Project Status: 
      - Timeline: timeline.md
      - Deliverables: deliverables.md
      - Kanban: kanban.md
  - The Project:
    - Intro: project/intro.md
    - First Phase: project/first-phase.md
    - Second Phase: project/second-phase.md
    - Third Phase: project/third-phase.md
  - Discovery:
    - Intro: discovery/intro.md
    - Assumptions: discovery/assumptions.md
    - Workshop: discovery/workshop.md
    - Problem Statement: discovery/problem-statement.md
  - Prototyping:
    - Intro: prototype/intro.md
    - Grounding: prototype/grounding.md
    - Data Model: prototype/data-model.md
    - Prototype: prototype/prototype.md
  - Validation:
    - Intro: audit/intro.md
    - End-to-End Case: audit/end-to-end-case.md
    - MVP Assessment: audit/mvp-assessment.md
  - Develop and Deploy:
    - Develop and Deploy: implementation/index.md
  - Q&A:
    - Q&A: questions/index.md
