"type: design":
  - changed-files:
    - any-glob-to-any-file: "prototype/**"

"type: docs":
  - changed-files:
    - any-glob-to-any-file:
      - "site-stakeholder/**"
      - "site-developer/**"
      - "docs/**"
      - "**/*.md"

"type: data-model":
  - changed-files:
    - any-glob-to-any-file: "sourceFiles/**"

"type: chore":
  - changed-files:
    - any-glob-to-any-file: ".github/**"

"audience: dev":
  - changed-files:
    - any-glob-to-any-file:
      - "prototype/**"
      - "sourceFiles/**"
      - ".github/**"

"audience: stakeholder":
  - changed-files:
    - any-glob-to-any-file:
      - "site-stakeholder/**"
      - "docs/stakeholder/**"
